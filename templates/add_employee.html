{% extends 'base.html' %}

{% block title %}Add Employee{% endblock %}

{% block content %}

<div class="card">

    <h1 style="margin-bottom:20px;">
        Add Employee
    </h1>

    <form id="employeeForm">

        <div class="form-group">
            <label>Employee Code</label>
            <input
                type="text"
                id="employee_code"
                required
            >
        </div>

        <div class="form-group">
            <label>Employee Name</label>
            <input
                type="text"
                id="name"
                required
            >
        </div>

        <div class="form-group">
            <label>Email</label>
            <input
                type="email"
                id="email"
                required
            >
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input
                type="text"
                id="phone"
                required
            >
        </div>

        <div class="form-group">
            <label>Department</label>
            <select id="department">

                <option value="IT">
                    IT
                </option>

                <option value="HR">
                    HR
                </option>

                <option value="Finance">
                    Finance
                </option>

                <option value="Sales">
                    Sales
                </option>

                <option value="Marketing">
                    Marketing
                </option>

            </select>
        </div>

        <div class="form-group">
            <label>Designation</label>
            <input
                type="text"
                id="designation"
                required
            >
        </div>

        <div class="form-group">
            <label>Salary</label>
            <input
                type="number"
                id="salary"
                required
            >
        </div>

        <div class="form-group">
            <label>Status</label>

            <select id="status">

                <option value="Active">
                    Active
                </option>

                <option value="Inactive">
                    Inactive
                </option>

            </select>
        </div>

        <button
            type="submit"
            class="btn btn-success"
        >
            Save Employee
        </button>

    </form>

</div>

{% endblock %}

{% block js %}

<script>

document
.getElementById("employeeForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    let employeeData = {

        employee_code:
            document.getElementById("employee_code").value,

        name:
            document.getElementById("name").value,

        email:
            document.getElementById("email").value,

        phone:
            document.getElementById("phone").value,

        department:
            document.getElementById("department").value,

        designation:
            document.getElementById("designation").value,

        salary:
            document.getElementById("salary").value,

        status:
            document.getElementById("status").value
    };

    fetch("/employees", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify(employeeData)

    })

    .then(response => response.json())

    .then(data => {

        alert(data.message);

        if(data.success){

            window.location.href =
                "/employees-page";

        }

    })

    .catch(error => {

        console.log(error);

        alert("Something went wrong");

    });

});

</script>

{% endblock %}
