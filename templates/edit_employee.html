{% extends 'base.html' %}

{% block title %}Edit Employee{% endblock %}

{% block content %}

<div class="card">

    <h1 style="margin-bottom:20px;">
        Edit Employee
    </h1>

    <form id="updateEmployeeForm">

        <div class="form-group">
            <label>Employee Name</label>

            <input
                type="text"
                id="name"
                value="{{ employee.name }}"
                required
            >
        </div>

        <div class="form-group">
            <label>Email</label>

            <input
                type="email"
                id="email"
                value="{{ employee.email }}"
                required
            >
        </div>

        <div class="form-group">
            <label>Phone</label>

            <input
                type="text"
                id="phone"
                value="{{ employee.phone }}"
                required
            >
        </div>

        <div class="form-group">
            <label>Department</label>

            <select id="department">

                <option value="IT"
                    {% if employee.department == 'IT' %}
                    selected
                    {% endif %}
                >
                    IT
                </option>

                <option value="HR"
                    {% if employee.department == 'HR' %}
                    selected
                    {% endif %}
                >
                    HR
                </option>

                <option value="Finance"
                    {% if employee.department == 'Finance' %}
                    selected
                    {% endif %}
                >
                    Finance
                </option>

                <option value="Sales"
                    {% if employee.department == 'Sales' %}
                    selected
                    {% endif %}
                >
                    Sales
                </option>

                <option value="Marketing"
                    {% if employee.department == 'Marketing' %}
                    selected
                    {% endif %}
                >
                    Marketing
                </option>

            </select>
        </div>

        <div class="form-group">
            <label>Designation</label>

            <input
                type="text"
                id="designation"
                value="{{ employee.designation }}"
                required
            >
        </div>

        <div class="form-group">
            <label>Salary</label>

            <input
                type="number"
                id="salary"
                value="{{ employee.salary }}"
                required
            >
        </div>

        <div class="form-group">
            <label>Status</label>

            <select id="status">

                <option value="Active"
                    {% if employee.status == 'Active' %}
                    selected
                    {% endif %}
                >
                    Active
                </option>

                <option value="Inactive"
                    {% if employee.status == 'Inactive' %}
                    selected
                    {% endif %}
                >
                    Inactive
                </option>

            </select>

        </div>

        <button
            type="submit"
            class="btn btn-warning"
        >
            Update Employee
        </button>

    </form>

</div>

{% endblock %}

{% block js %}

<script>

document
.getElementById("updateEmployeeForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    const employeeData = {

        name:
            document.getElementById("name").value,

        email:
            document.getElementById("email").value,

        phone:
            document.getElementById("phone").value,

        department:
            document.getElementById("department").value,

        designation:
            document.getElementById("designation").value,

        salary:
            document.getElementById("salary").value,

        status:
            document.getElementById("status").value

    };

    fetch(
        "/employees/{{ employee.id }}",
        {
            method: "PUT",

            headers: {
                "Content-Type":
                "application/json"
            },

            body:
                JSON.stringify(employeeData)
        }
    )

    .then(response => response.json())

    .then(data => {

        alert(data.message);

        if(data.success){

            window.location.href =
                "/employees-page";
        }

    })

    .catch(error => {

        console.log(error);

        alert("Update failed");

    });

});

</script>

{% endblock %}
