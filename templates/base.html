<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Employee Management System{% endblock %}</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        .container{
            display:flex;
            min-height:100vh;
        }

        .sidebar{
            width:250px;
            background:#1e293b;
            color:white;
            padding:20px;
        }

        .sidebar h2{
            text-align:center;
            margin-bottom:30px;
        }

        .sidebar ul{
            list-style:none;
        }

        .sidebar ul li{
            margin:15px 0;
        }

        .sidebar ul li a{
            color:white;
            text-decoration:none;
            display:block;
            padding:10px;
            border-radius:6px;
        }

        .sidebar ul li a:hover{
            background:#334155;
        }

        .main-content{
            flex:1;
        }

        .navbar{
            background:white;
            padding:15px 25px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .navbar h3{
            color:#333;
        }

        .content{
            padding:25px;
        }

        .card{
            background:white;
            border-radius:10px;
            padding:20px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
        }

        .footer{
            text-align:center;
            padding:15px;
            margin-top:20px;
            color:#666;
        }

        .btn{
            padding:10px 15px;
            border:none;
            border-radius:6px;
            cursor:pointer;
            text-decoration:none;
            display:inline-block;
        }

        .btn-primary{
            background:#2563eb;
            color:white;
        }

        .btn-success{
            background:#16a34a;
            color:white;
        }

        .btn-danger{
            background:#dc2626;
            color:white;
        }

        .btn-warning{
            background:#f59e0b;
            color:white;
        }

        table{
            width:100%;
            border-collapse:collapse;
            margin-top:15px;
        }

        table th,
        table td{
            padding:12px;
            border:1px solid #ddd;
            text-align:left;
        }

        table th{
            background:#1e293b;
            color:white;
        }

        input,
        select{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
            margin-top:5px;
        }

        .form-group{
            margin-bottom:15px;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(4,1fr);
            gap:20px;
        }

        .stat-card{
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 5px rgba(0,0,0,0.1);
            text-align:center;
        }

        .stat-card h2{
            color:#2563eb;
            margin-bottom:10px;
        }

        @media(max-width:768px){

            .container{
                flex-direction:column;
            }

            .sidebar{
                width:100%;
            }

            .grid{
                grid-template-columns:1fr;
            }
        }
    </style>

    {% block css %}{% endblock %}
</head>
<body>

<div class="container">

    <div class="sidebar">

        <h2>EMS</h2>

        <ul>
            <li>
                <a href="/">Dashboard</a>
            </li>

            <li>
                <a href="/employees-page">Employees</a>
            </li>

            <li>
                <a href="/add-employee">Add Employee</a>
            </li>
        </ul>

    </div>

    <div class="main-content">

        <div class="navbar">
            <h3>Employee Management System</h3>
            <span>Admin Panel</span>
        </div>

        <div class="content">
            {% block content %}
            {% endblock %}
        </div>

        <div class="footer">
            Employee Management System | Python Flask Project
        </div>

    </div>

</div>

{% block js %}
{% endblock %}

</body>
</html>
